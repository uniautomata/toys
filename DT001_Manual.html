<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>The Kangaru — UNIAUTOMATA</title>
  <meta property="og:title" content="BY UNIAUTOMATA" />
  <meta property="og:description" content="&#160;" />
  <meta property="og:image" content="https://uniautomata.github.io/toys/Uniautomata.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 0 60px;
      -webkit-user-select: none;
      user-select: none;
      overflow-x: hidden;
    }

    .top-bar {
      width: 100%;
      max-width: 800px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      margin-bottom: 32px;
    }

    .back-btn {
      font-family: 'Courier New', Courier, monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #888;
      text-decoration: none;
      border-bottom: 1px solid #444;
      padding-bottom: 2px;
      transition: color 0.15s;
    }

    .back-btn:hover {
      color: #fff;
    }

    .brand {
      font-family: 'Courier New', Courier, monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      color: #444;
      text-transform: uppercase;
    }

    .manual-img {
      width: 100%;
      max-width: 800px;
      height: auto;
      display: block;
      pointer-events: none;
      -webkit-user-drag: none;
      user-drag: none;
    }

    .footer-note {
      margin-top: 24px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 10px;
      color: #333;
      letter-spacing: 0.1em;
      text-align: center;
    }
  </style>
</head>
<body
  oncontextmenu="return false;"
  ondragstart="return false;"
>

  <div class="top-bar">
    <a class="back-btn" href="DT001.html">← Back</a>

  </div>

  <img
    class="manual-img"
    src="https://pub-868b187a35214242af48cf2e58bad405.r2.dev/thekangaru/The_Kangaru_Manual_Test.jpg"
    alt="Assembly Manual"
    draggable="false"
    oncontextmenu="return false;"
  />

  <div class="footer-note">© UNIAUTOMATA — ALL RIGHTS RESERVED</div>

  <script>
    // 防止手機長按儲存圖片
    document.addEventListener('touchstart', function(e) {
      if (e.target.tagName === 'IMG') {
        e.preventDefault();
      }
    }, { passive: false });

    document.addEventListener('touchend', function(e) {
      if (e.target.tagName === 'IMG') {
        e.preventDefault();
      }
    }, { passive: false });
  </script>

</body>
</html>
